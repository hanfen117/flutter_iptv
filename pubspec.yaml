name: flutter_iptv
description: Flutter跨端IPTV播放器，适配Android TV遥控器、在线/本地M3U导入
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_vlc_player: ^7.4.1
  http: ^1.2.1
  shared_preferences: ^2.2.3
  file_picker: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
